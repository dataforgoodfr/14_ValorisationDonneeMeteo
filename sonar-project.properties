# SonarCloud — remplacer your-org et la clé projet par les valeurs affichées dans
# SonarCloud → Administration → Project Information (après import du dépôt GitHub).
sonar.organization=your-org
sonar.projectKey=your-org_14_ValorisationDonneeMeteo

sonar.host.url=https://sonarcloud.io

sonar.sources=backend,frontend
sonar.sourceEncoding=UTF-8

sonar.python.version=3.12

sonar.exclusions=**/node_modules/**,**/.nuxt/**,**/dist/**,**/.output/**,**/htmlcov/**,**/migrations/**,**/*.min.js,**/uv.lock,**/package-lock.json,**/coverage/**,**/.pytest_cache/**

sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/*.spec.ts,**/*.config.ts,**/manage.py

sonar.python.coverage.reportPaths=backend/reports/coverage-backend.xml
sonar.javascript.lcov.reportPaths=frontend/reports/coverage/lcov.info
