name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  backend:
    name: Backend Python
    runs-on: ubuntu-24.04
    env:
      DEBUG: "true"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000

    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync backend dependencies
        run: uv sync --frozen --extra dev

      - name: Lint backend
        run: uv run ruff check weather config manage.py --ignore DJ001,C420

      - name: Run backend tests
        run: |
          if [ -d weather/tests ]; then
            uv run pytest weather/tests
          else
            echo "No backend tests directory found, skipping."
          fi

  frontend:
    name: Frontend JS
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Run frontend tests
        run: |
          if npm ls vitest >/dev/null 2>&1; then
            npm run test:unit --if-present
          else
            echo "Vitest not installed, skipping frontend tests."
          fi

      - name: Build frontend
        run: npm run build --if-present
