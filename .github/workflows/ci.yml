name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]

    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
          POSTGRES_DB: meteodb
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb" --health-interval
          10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          cd backend
          uv sync --extra dev

      - name: Lint with Ruff
        run: |
          cd backend
          uv run ruff check . --output-format json --output-file ruff-report.json

      - name: Tests with pytest
        run: |
          cd backend
          uv run pytest --junitxml=pytest-report.xml --cov=weather --cov-report=xml --cov-report=term

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            backend/ruff-report.json
            backend/pytest-report.xml
            backend/coverage.xml

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:unit --if-present

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [ test-backend, test-frontend ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: results.sarif
          severity: CRITICAL,HIGH

      - name: Trivy JSON report
        run: |
          trivy fs --severity CRITICAL,HIGH --format json --output trivy-report.json .

      - name: Generate OpenVEX file
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile report trivy-report.json '
              {
                "@context": "https://openvex.dev/ns",
                "@id": ("https://github.com/" + $repo + "/attestations/vex-" + $sha),
                "author": "github-actions",
                "timestamp": $timestamp,
                "version": 1,
                "tooling": "trivy",
                "statements": (
                  [
                    ($report[0].Results // [])[]
                    | . as $result
                    | ($result.Vulnerabilities // [])[]
                    | {
                        vulnerability: { name: .VulnerabilityID },
                        products: [
                          {
                            "@id": (
                              .PkgIdentifier.PURL
                              // ("pkg:generic/" + ((.PkgName // "unknown") | ascii_downcase))
                            )
                          }
                        ],
                        status: "under_investigation",
                        justification: "component_not_present"
                      }
                  ]
                )
              }
            ' > trivy.vex.json

      - name: Upload trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            results.sarif
            trivy-report.json
            trivy.vex.json

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  docker-build:
    runs-on: ubuntu-latest
    needs: [ test-backend, test-frontend, trivy-scan ]
    strategy:
      matrix:
        include:
          - service: backend
            dockerfile: ./backend/Dockerfile
            context: ./backend
          - service: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.service }}:ci
