name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      break_test:
        description: "Force the dedicated CI test to fail"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"
  CI_BREAK_TEST: ${{ github.event.inputs.break_test == 'true' && 'true' || 'false' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend | Install, Lint, Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DEBUG: "true"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000

    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Wait for TimescaleDB
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432

          for attempt in range(60):
              try:
                  with socket.create_connection((host, port), timeout=1):
                      print("TimescaleDB is reachable")
                      break
              except OSError:
                  time.sleep(2)
          else:
              raise SystemExit("TimescaleDB did not become reachable in time")
          PY

      - name: Prepare report directories
        run: |
          mkdir -p reports/test-report reports/scan-code-report
          printf '<testsuite name="backend" tests="0"></testsuite>\n' > reports/test-report/backend-pytest.xml
          printf '[]\n' > reports/scan-code-report/backend-ruff.json
          : > reports/scan-code-report/backend-ruff-format.txt

      - name: Run backend linter
        run: |
          uv run ruff check weather config manage.py --ignore DJ001,C420 --output-format json > reports/scan-code-report/backend-ruff.json
          uv run ruff format --check weather config manage.py > reports/scan-code-report/backend-ruff-format.txt

      - name: Run backend tests
        run: uv run pytest weather/tests --junitxml=reports/test-report/backend-pytest.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/reports/test-report
          if-no-files-found: warn

      - name: Upload scan code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-code-report-backend
          path: backend/reports/scan-code-report
          if-no-files-found: warn

  frontend:
    name: Frontend | Install, Lint, Test, Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare report directories
        run: |
          mkdir -p reports/test-report reports/scan-code-report
          printf '<testsuite name="frontend" tests="0" skipped="1"><testcase classname="frontend" name="no-tests"><skipped message="No frontend tests found in repository."/></testcase></testsuite>\n' > reports/test-report/frontend-vitest.xml
          printf '[]\n' > reports/scan-code-report/frontend-eslint.json

      - name: Run frontend linter
        run: npx eslint . --ext .js,.ts,.vue -f json -o reports/scan-code-report/frontend-eslint.json

      - name: Run frontend tests
        run: |
          if find . -path './node_modules' -prune -o \( -name '*.spec.*' -o -name '*.test.*' -o -path '*/__tests__/*' \) -print | grep -q .; then
            npx vitest run --reporter=default --reporter=junit --outputFile=reports/test-report/frontend-vitest.xml
          else
            echo "No frontend test files found, keeping skipped JUnit report."
          fi

      - name: Build frontend
        run: npm run build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-frontend
          path: frontend/reports/test-report
          if-no-files-found: warn

      - name: Upload scan code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-code-report-frontend
          path: frontend/reports/scan-code-report
          if-no-files-found: warn

  security-scan:
    name: Security | Audit, Bandit, Trivy, VEX
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Prepare security report directories
        run: |
          mkdir -p reports/security-scan-report
          mkdir -p reports/trivy-report
          mkdir -p reports/fichier-vex
          printf '{}\n' > reports/security-scan-report/backend-pip-audit.json
          printf '{}\n' > reports/security-scan-report/backend-bandit.json
          printf '{}\n' > reports/security-scan-report/frontend-npm-audit.json
          printf '{"Results":[]}\n' > reports/trivy-report/trivy-report.json
          printf '{"version":"2.1.0","runs":[]}\n' > reports/trivy-report/trivy-report.sarif
          printf '{"@context":"https://openvex.dev/ns/v0.2.0","statements":[]}\n' > reports/fichier-vex/openvex.json

      - name: Run backend dependency audit
        working-directory: backend
        run: |
          set +e
          uvx --from pip-audit pip-audit --format json --output ../reports/security-scan-report/backend-pip-audit.json
          status=$?
          echo "$status" > ../reports/security-scan-report/backend-pip-audit.exitcode
          exit 0

      - name: Run backend static security scan
        working-directory: backend
        run: |
          set +e
          uvx --from bandit bandit -r weather -f json -o ../reports/security-scan-report/backend-bandit.json
          status=$?
          echo "$status" > ../reports/security-scan-report/backend-bandit.exitcode
          exit 0

      - name: Run frontend dependency audit
        working-directory: frontend
        run: |
          set +e
          npm audit --json > ../reports/security-scan-report/frontend-npm-audit.json
          status=$?
          echo "$status" > ../reports/security-scan-report/frontend-npm-audit.exitcode
          exit 0

      - name: Run Trivy filesystem scan
        run: |
          mkdir -p "$HOME/.cache/trivy"
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.65.0 \
            fs /work \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL,HIGH,MEDIUM \
            --format json \
            --output /work/reports/trivy-report/trivy-report.json \
            --exit-code 0

      - name: Run Trivy SARIF export
        run: |
          mkdir -p "$HOME/.cache/trivy"
          docker run --rm \
            -v "$PWD:/work" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.65.0 \
            fs /work \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output /work/reports/trivy-report/trivy-report.sarif \
            --exit-code 0

      - name: Generate OpenVEX file
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          trivy_path = Path("reports/trivy-report/trivy-report.json")
          try:
              data = json.loads(trivy_path.read_text())
          except Exception:
              data = {"Results": []}

          statements = []
          for result in data.get("Results", []):
              target = result.get("Target", "unknown")
              for vuln in result.get("Vulnerabilities", []) or []:
                  vuln_id = vuln.get("VulnerabilityID")
                  if not vuln_id:
                      continue
                  statements.append(
                      {
                          "vulnerability": {"name": vuln_id},
                          "products": [{"@id": target}],
                          "status": "under_investigation",
                          "justification": "component_not_present",
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                      }
                  )

          vex = {
              "@context": "https://openvex.dev/ns/v0.2.0",
              "@id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "author": "GitHub Actions",
              "role": "build",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "version": 1,
              "tooling": "custom-ci-workflow",
              "statements": statements,
          }

          Path("reports/fichier-vex/openvex.json").write_text(json.dumps(vex, indent=2))
          PY

      - name: Upload security scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: reports/security-scan-report
          if-no-files-found: warn

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy-report
          if-no-files-found: warn

      - name: Upload VEX file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fichier-vex
          path: reports/fichier-vex
          if-no-files-found: warn

  build-images:
    name: Docker | Build Images
    runs-on: ubuntu-24.04
    needs:
      - backend
      - frontend
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image names
        run: |
          echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build backend image
        run: docker build -t "$REGISTRY/$IMAGE_REPOSITORY-backend:$IMAGE_TAG" ./backend

      - name: Build frontend image
        run: docker build -t "$REGISTRY/$IMAGE_REPOSITORY-frontend:$IMAGE_TAG" ./frontend

      - name: Export backend image
        run: |
          mkdir -p reports/docker-image-backend
          docker save "$REGISTRY/$IMAGE_REPOSITORY-backend:$IMAGE_TAG" | gzip > reports/docker-image-backend/backend-image.tar.gz

      - name: Export frontend image
        run: |
          mkdir -p reports/docker-image-frontend
          docker save "$REGISTRY/$IMAGE_REPOSITORY-frontend:$IMAGE_TAG" | gzip > reports/docker-image-frontend/frontend-image.tar.gz

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-backend
          path: reports/docker-image-backend
          if-no-files-found: warn

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-frontend
          path: reports/docker-image-frontend
          if-no-files-found: warn

  push-images:
    name: Docker | Push to Registry
    runs-on: ubuntu-24.04
    needs:
      - backend
      - frontend
      - security-scan
      - build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image metadata
        run: |
          echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}-frontend:latest
