name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # =========================
  # BACKEND
  # =========================
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U infoclimat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install .[dev]

      - name: Wait for DB
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U infoclimat; do
            sleep 2
          done

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests (with report)
        run: |
          cd backend
          pytest --junitxml=report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/report.xml

      - name: Lint check (Ruff)
        run: |
          cd backend
          ruff check . --fix

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # =========================
  # FRONTEND
  # =========================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Build
        run: |
          cd frontend
          npm run build

  # =========================
  # DOCKER + SECURITY
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f docker-compose.test.yml build

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  # =========================
  # PUSH DOCKER
  # =========================
  push:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t matthisphan/meteoci .

      - name: Push image
        run: docker push matthisphan/meteoci
