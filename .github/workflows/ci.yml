name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────
  # FRONTEND — Nuxt
  # ────────────────────────────────────────────────────────────────
  frontend-deps:
    name: "Frontend — Install"
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ hashFiles('frontend/package-lock.json') }}

  frontend-test:
    name: "Frontend — Tests"
    runs-on: ubuntu-24.04
    needs: frontend-deps
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Run tests
        run: npm run test --if-present -- --reporter=junit --outputFile=../reports/frontend-tests.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: reports/frontend-tests.xml

  frontend-lint:
    name: "Frontend — Lint"
    runs-on: ubuntu-24.04
    needs: frontend-deps
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

  # ────────────────────────────────────────────────────────────────
  # BACKEND — Python
  # ────────────────────────────────────────────────────────────────
  backend-deps:
    name: "Backend — Install"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

  backend-test:
    name: "Backend — Tests"
    runs-on: ubuntu-24.04
    needs: backend-deps
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short --junitxml=../reports/backend-tests.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/backend-tests.xml

  backend-lint:
    name: "Backend — Lint"
    runs-on: ubuntu-24.04
    needs: backend-deps
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . --output-format=junit > ../reports/backend-lint.xml || true

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-lint-report
          path: reports/backend-lint.xml

  # ────────────────────────────────────────────────────────────────
  # SECURITY SCAN — code source (Trivy fs + Semgrep)
  # ────────────────────────────────────────────────────────────────
  security-scan:
    name: "Security — Source Scan"
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif

  # ────────────────────────────────────────────────────────────────
  # DOCKER BUILD + TRIVY IMAGE SCAN
  # ────────────────────────────────────────────────────────────────
  frontend-docker:
    name: "Frontend — Docker Build & Trivy"
    runs-on: ubuntu-24.04
    needs:
      - frontend-test
      - frontend-lint
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:ci

      - name: Trivy — scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:ci
          format: sarif
          output: trivy-frontend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — scan image (table for artifact)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:ci
          format: table
          output: trivy-frontend-image.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF (frontend image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-image.sarif
          category: trivy-frontend-image

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-image-report
          path: |
            trivy-frontend-image.sarif
            trivy-frontend-image.txt

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

  backend-docker:
    name: "Backend — Docker Build & Trivy"
    runs-on: ubuntu-24.04
    needs:
      - backend-test
      - backend-lint
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:ci

      - name: Trivy — scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:ci
          format: sarif
          output: trivy-backend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — scan image (table for artifact)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:ci
          format: table
          output: trivy-backend-image.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF (backend image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-image.sarif
          category: trivy-backend-image

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-image-report
          path: |
            trivy-backend-image.sarif
            trivy-backend-image.txt

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────
  # GATE
  # ────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI — Gate"
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - frontend-docker
      - backend-docker
      - security-scan
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.frontend-docker.result }}"
            "${{ needs.backend-docker.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "❌ A required job failed"
              exit 1
            fi
          done
          echo "✅ All checks passed"
