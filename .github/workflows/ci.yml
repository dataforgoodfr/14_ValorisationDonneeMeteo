name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  backend:
    name: "Backend – install / lint / test / scan / docker"
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (uv sync --extra dev)
        run: uv sync --extra dev

      - name: Run linter – ruff check
        run: uv run ruff check .

      - name: Run formatter check – ruff format
        run: uv run ruff format --check .

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run tests – pytest (JUnit + coverage)
        run: |
          uv run pytest \
            --junitxml=reports/junit-backend.xml \
            --cov=weather \
            --cov=config \
            --cov-report=xml:reports/coverage-backend.xml \
            --cov-report=term-missing

      - name: Run security scan – pip-audit
        run: |
          set -o pipefail
          uvx pip-audit 2>&1 | tee reports/pip-audit.txt

      - name: Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: backend
          format: table
          output: backend/reports/trivy-backend.txt
          exit-code: "0"
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload backend CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports-${{ github.sha }}
          path: backend/reports
          retention-days: 14

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: "Frontend – install / lint / test / scan / docker"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm install)
        run: npm install

      - name: Run linter – eslint
        run: npm run lint

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run tests – vitest (JUnit + coverage)
        run: npm run test:ci

      - name: Run security scan – npm audit
        run: |
          set -o pipefail
          npm audit --audit-level=high 2>&1 | tee reports/npm-audit.txt

      - name: Trivy filesystem scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: frontend
          format: table
          output: frontend/reports/trivy-frontend.txt
          exit-code: "0"
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload frontend CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-reports-${{ github.sha }}
          path: frontend/reports
          retention-days: 14

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sonarqube:
    name: SonarCloud
    needs: [backend, frontend]
    if: |
      vars.SONAR_ENABLED == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend reports
        uses: actions/download-artifact@v4
        with:
          name: backend-reports-${{ github.sha }}
          path: backend/reports

      - name: Download frontend reports
        uses: actions/download-artifact@v4
        with:
          name: frontend-reports-${{ github.sha }}
          path: frontend/reports

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
