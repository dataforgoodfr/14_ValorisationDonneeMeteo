repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]

      - id: ruff-format

  - repo: local
    hooks:
      - id: backend-pre-commit
        name: Run backend pre-commit hooks
        entry: bash -c 'cd backend && uv run pre-commit run --all-files --config=.pre-commit-config.yaml'
        language: system
        pass_filenames: false
        always_run: true

  # Frontend hooks
  - repo: local
    hooks:
      - id: frontend-pre-commit
        name: Run frontend pre-commit hooks
        entry: bash -c 'cd frontend && npm run check'
        language: system
        pass_filenames: false
        always_run: true

  # Hooks généraux
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
