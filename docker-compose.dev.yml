services:
  timescaledb:
    image: timescale/timescaledb:2.25.0-pg17
    container_name: timescaledb
    environment:
      POSTGRES_USER: infoclimat
      POSTGRES_PASSWORD: infoclimat2026
      POSTGRES_DB: meteodb
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./timescaledb-env/meteodb_dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
    networks:
      - bd_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infoclimat -d meteodb"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        BACKEND_BASE_IMAGE: ${BACKEND_BASE_IMAGE:-python:3.12-slim-bookworm}
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - app_net
      - bd_net

  frontend:
    build:
      context: ./frontend
      args:
        FRONTEND_BUILD_IMAGE: ${FRONTEND_BUILD_IMAGE:-node:24-alpine}
        FRONTEND_RUNTIME_IMAGE: ${FRONTEND_RUNTIME_IMAGE:-node:24-alpine}
    env_file:
      - ./.env
    networks:
      - app_net

  nginx:
    image: nginx:1.29.5-alpine3.23-perl
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app_net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - app_net

volumes:
  timescaledb-data:
    driver: local

networks:
  app_net:
  bd_net:
